<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Seguro</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .login-container { max-width: 400px; margin-top: 10% }
    </style>
</head>
<body>

    <div class="container login-container">
        <div class="card shadow-sm p-4">
            <h3 class="text-center mb-4">Iniciar Sesión</h3>
            
            <form id="loginForm">
                <div class="mb-3">
                    <label for="email" class="form-label">Correo electrónico</label>
                    <input type="email" class="form-control" id="email" required placeholder="usuario@correo.com">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary w-100" id="loginBtn">
                    <span id="btnText">Ingresar</span>
                    <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                </button>
            </form>

            <div id="errorMessage" class="alert alert-danger mt-3 d-none" role="alert"></div>
        </div>
    </div>

    <!-- 1. LIBRERÍA DE SUPABASE (Imprescindible para GitHub Pages) -->
    <script src="https://jsdelivr.net"></script>
    
    <!-- 2. TU SCRIPT DE LOGICA -->
    <script src="app.js"></script>
</body>
</html>
