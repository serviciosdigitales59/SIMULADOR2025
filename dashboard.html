<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Protegido</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://jsdelivr.net" rel="stylesheet">
</head>
<!-- Agregamos "d-none" para que la página cargue en blanco mientras JS verifica al usuario -->
<body id="protectedBody" class="d-none bg-light">

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Bienvenido a la Web Privada</h2>
            <!-- Botón para cerrar sesión -->
            <button id="logoutBtn" class="btn btn-danger">Cerrar Sesión</button>
        </div>

        <div class="card p-4 shadow-sm">
            <h4>Contenido Exclusivo para tus 50 usuarios</h4>
            <p>Este texto, tus imágenes o tus enlaces ahora están completamente seguros.</p>
        </div>
    </div>

    <!-- Cargar Supabase antes que tu script -->
    <script src="https://jsdelivr.net"></script>
    <!-- Tu script de protección -->
    <script src="dashboard.js"></script>
</body>
</html>
